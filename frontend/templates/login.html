<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role | TrustLancer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .split-pane { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .pane-overlay { background: linear-gradient(to right, rgba(15, 23, 42, 0.9), transparent); }
        .pane-overlay-right { background: linear-gradient(to left, rgba(45, 50, 140, 0.9), transparent); }
        .btn-select { transition: all 0.4s ease; transform: translateY(0); }
        .btn-select:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="overflow-hidden h-screen bg-black">

    <div class="flex h-full w-full relative">
        
        <!-- CENTER BADGE -->
        <div class="absolute z-30 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-white rounded-full flex items-center justify-center font-black text-slate-900 shadow-[0_0_50px_rgba(255,255,255,0.2)] border-8 border-black text-xl italic tracking-tighter hidden md:flex">
            VS
        </div>

        <!-- CLIENT SIDE -->
        <div class="split-pane relative w-full md:w-1/2 h-1/2 md:h-full group overflow-hidden">
            <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80" class="absolute inset-0 w-full h-full object-cover grayscale brightness-50 group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000">
            <div class="absolute inset-0 pane-overlay group-hover:opacity-80 transition-opacity"></div>
            
            <div class="relative z-10 h-full flex flex-col items-center justify-center p-12 text-center">
                <h2 class="text-white text-5xl md:text-7xl font-black mb-6 tracking-tighter uppercase italic leading-none">
                    I Want to<br><span class="text-indigo-400">Hire AI-Ready</span>
                </h2>
                <p class="text-slate-300 text-lg mb-12 max-w-sm font-medium leading-relaxed">
                    Deploy verified technical talent and automate your project workflow with AI agents.
                </p>
                <a href="/auth/client/login" class="btn-select bg-white text-slate-950 px-12 py-5 rounded-full font-black uppercase tracking-widest text-sm hover:bg-slate-200 shadow-xl">
                    Client Login <i class="fas fa-arrow-right ml-3"></i>
                </a>
            </div>
        </div>

        <!-- FREELANCER SIDE -->
        <div class="split-pane relative w-full md:w-1/2 h-1/2 md:h-full group overflow-hidden border-t md:border-t-0 md:border-l border-white/5">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80" class="absolute inset-0 w-full h-full object-cover grayscale brightness-50 group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000">
            <div class="absolute inset-0 pane-overlay-right bg-indigo-900/40 group-hover:opacity-60 transition-opacity"></div>
            
            <div class="relative z-10 h-full flex flex-col items-center justify-center p-12 text-center">
                <h2 class="text-white text-5xl md:text-7xl font-black mb-6 tracking-tighter uppercase italic leading-none">
                    I Want to<br><span class="text-pink-400">Build & Earn</span>
                </h2>
                <p class="text-indigo-100 text-lg mb-12 max-w-sm font-medium leading-relaxed">
                    Showcase your autonomous engineering skills and get paid via smart milestones.
                </p>
                <a href="/auth/freelancer/login" class="btn-select bg-indigo-600 text-white px-12 py-5 rounded-full font-black uppercase tracking-widest text-sm border-2 border-indigo-400 hover:bg-indigo-500 shadow-xl">
                    Freelancer Login <i class="fas fa-briefcase ml-3"></i>
                </a>
            </div>
        </div>

    </div>

    <!-- Top Branding -->
    <div class="absolute top-10 left-10 z-50 flex items-center space-x-3">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-2xl">
            <i class="fas fa-rocket text-slate-900 text-xl"></i>
        </div>
        <h1 class="text-2xl font-black text-white tracking-widest">TRUSTLANCER <span class="text-indigo-400 uppercase">AI</span></h1>
    </div>

</body>
</html>
