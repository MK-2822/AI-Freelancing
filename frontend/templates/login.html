<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrustLancer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .split-side {
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-black overflow-hidden">

    <div class="relative flex flex-col md:flex-row h-screen w-full">
        
        <!-- Center "VS" Badge -->
        <div class="absolute z-20 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-slate-900 w-14 h-14 rounded-full shadow-2xl hidden md:flex items-center justify-center font-bold border-4 border-black">
            VS
        </div>

        <!-- CLIENT SIDE (LEFT) -->
        <div class="split-side relative w-full md:w-1/2 h-1/2 md:h-full bg-slate-900 flex items-center justify-center overflow-hidden group hover:md:w-[55%]">
            <!-- Background with Overlay -->
            <div class="absolute inset-0 opacity-50 group-hover:opacity-70 transition-opacity duration-500">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80" alt="Client" class="w-full h-full object-cover">
            </div>
            <div class="absolute inset-0 bg-gradient-to-r from-slate-900 to-transparent"></div>

            <!-- Content -->
            <div class="relative z-10 text-center px-8">
                <h2 class="text-white text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter uppercase italic leading-tight">
                    I Want to<br><span class="text-indigo-400">Hire AI-Ready</span>
                </h2>
                <p class="text-slate-300 text-lg mb-10 max-w-sm mx-auto font-medium">
                    Find verified talent and manage projects with AI automation.
                </p>
                
                <!-- THE BUTTON -->
                <a href="/auth/client/login" class="inline-flex items-center justify-center bg-white text-slate-900 px-10 py-4 rounded-full font-extrabold text-lg uppercase tracking-wider hover:bg-indigo-500 hover:text-white transition-all transform hover:scale-110 shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                    Login as Client <i class="fas fa-arrow-right ml-3"></i>
                </a>
            </div>
        </div>

        <!-- FREELANCER SIDE (RIGHT) -->
        <div class="split-side relative w-full md:w-1/2 h-1/2 md:h-full bg-indigo-700 flex items-center justify-center overflow-hidden group hover:md:w-[55%]">
            <!-- Background with Overlay -->
            <div class="absolute inset-0 opacity-50 group-hover:opacity-70 transition-opacity duration-500">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80" alt="Freelancer" class="w-full h-full object-cover">
            </div>
            <div class="absolute inset-0 bg-gradient-to-l from-indigo-900/80 to-transparent"></div>

            <!-- Content -->
            <div class="relative z-10 text-center px-8">
                <h2 class="text-white text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter uppercase italic leading-tight">
                    I Want to<br><span class="text-indigo-200">Work & Build</span>
                </h2>
                <p class="text-indigo-100 text-lg mb-10 max-w-sm mx-auto font-medium">
                    Showcase your AI skills and get paid instantly via smart milestones.
                </p>

                <!-- THE BUTTON -->
                <a href="/auth/freelancer/login" class="inline-flex items-center justify-center bg-indigo-950 text-white px-10 py-4 rounded-full font-extrabold text-lg uppercase tracking-wider border-2 border-indigo-400 hover:bg-white hover:text-indigo-900 transition-all transform hover:scale-110 shadow-[0_0_30px_rgba(79,70,229,0.4)]">
                    Login as Freelancer <i class="fas fa-briefcase ml-3"></i>
                </a>
            </div>
        </div>

    </div>

    <!-- Branding Top Left -->
    <div class="absolute top-8 left-8 z-30 flex items-center space-x-3">
        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
            <i class="fas fa-robot text-slate-900"></i>
        </div>
        <h1 class="text-2xl font-black text-white tracking-tighter">
            TRUSTLANCER <span class="text-indigo-400 uppercase">AI</span>
        </h1>
    </div>

</body>
</html>
