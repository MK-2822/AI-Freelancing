<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TrustLancer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-field {
            background: rgba(240, 244, 248, 0.8);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: white;
            border-color: #cbd5e1;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-6">

    <!-- Branding Logo Top Left -->
    <div class="absolute top-10 left-10 flex items-center space-x-2">
        <div class="w-8 h-8 bg-black rounded flex items-center justify-center">
            <i class="fas fa-robot text-white text-xs"></i>
        </div>
        <span class="font-bold text-slate-900 tracking-tight">TrustLancer AI</span>
    </div>

    <!-- Main Login Card -->
    <div class="glass-panel w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl shadow-blue-100/50">
        
        <!-- Header Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-slate-100">
                <i class="fas fa-sign-in-alt text-slate-600 text-xl"></i>
            </div>
        </div>

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Sign in as {{ role }}</h1>
            <p class="text-slate-500 text-sm leading-relaxed px-4">
                Access your AI-powered workspace to manage projects, milestones, and payments.
            </p>
        </div>

        <!-- Form -->
        <form action="{% if role == 'Client' %}/client-dashboard{% else %}/freelancer-dashboard{% endif %}" method="GET" class="space-y-4">
            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                    <i class="far fa-envelope"></i>
                </span>
                <input type="email" placeholder="Email" class="input-field w-full pl-11 pr-4 py-3.5 rounded-2xl outline-none text-slate-700" required>
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" placeholder="Password" class="input-field w-full pl-11 pr-12 py-3.5 rounded-2xl outline-none text-slate-700" required>
                <button type="button" class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-slate-600">
                    <i class="far fa-eye"></i>
                </button>
            </div>

            <div class="flex justify-end mt-2">
                <a href="#" class="text-xs font-semibold text-slate-600 hover:text-black">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white font-semibold py-4 rounded-2xl hover:bg-black transition-all transform active:scale-[0.98] shadow-lg shadow-slate-200 mt-4">
                Get Started
            </button>
        </form>

        <!-- Social Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-transparent px-2 text-slate-400">Or sign in with</span>
            </div>
        </div>

        <!-- Social Buttons -->
        <div class="flex justify-center space-x-6">
            <button class="w-10 h-10 flex items-center justify-center hover:scale-110 transition-transform">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
            </button>
            <button class="w-10 h-10 flex items-center justify-center hover:scale-110 transition-transform">
                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
            </button>
            <button class="w-10 h-10 flex items-center justify-center hover:scale-110 transition-transform text-slate-900">
                <i class="fab fa-apple text-xl"></i>
            </button>
        </div>
    </div>

</body>
</html>
